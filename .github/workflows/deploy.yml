name: Deploy Vite React App to GitHub Pages

on:
  # Memanggil workflow ini setiap kali ada push ke branch main
  push:
    branches: ["main"]
  # Memungkinkan untuk memicu workflow secara manual
  workflow_dispatch:

# Memberikan permission yang dibutuhkan oleh GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Memastikan hanya ada satu deployment yang berjalan dalam satu waktu
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Job untuk melakukan Build
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
        
      - name: Build project
        run: npm run build
        env:
          VITE_NASA_API_KEY: ${{ secrets.VITE_NASA_API_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Menyesuaikan dengan output folder dari Vite
          path: './dist'

  # Job untuk melakukan Deployment
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
